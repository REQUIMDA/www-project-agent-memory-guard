name: Update Download Stats Daily

on:
  schedule:
    - cron: "30 0 * * *"  # Run daily at 00:30 UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SECRET_TOKEN }}

      - name: Fetch PyPI download counts
        id: downloads
        run: |
          # Get total downloads from pypistats
          AMG=$(curl -s "https://pypistats.org/api/packages/agent-memory-guard/overall?mirrors=true" | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(r['downloads'] for r in d['data']))")
          sleep 2
          LANGCHAIN=$(curl -s "https://pypistats.org/api/packages/langchain-agent-memory-guard/overall?mirrors=true" | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(r['downloads'] for r in d['data']))")
          
          # Get clone count from gist
          CLONES=$(curl -s "https://gist.githubusercontent.com/vgudur-dev/c04e12f68c363625faf12faaf03a03ca/raw/clone.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['count'])")
          
          TOTAL=$((AMG + LANGCHAIN + CLONES))
          echo "amg=$AMG" >> $GITHUB_OUTPUT
          echo "langchain=$LANGCHAIN" >> $GITHUB_OUTPUT
          echo "clones=$CLONES" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Total: $TOTAL (AMG: $AMG, LangChain: $LANGCHAIN, Clones: $CLONES)"

      - name: Update README with latest total
        run: |
          TOTAL=${{ steps.downloads.outputs.total }}
          # Round down to nearest 100 for display
          DISPLAY=$(python3 -c "print(f'{int($TOTAL / 100) * 100:,}+')")
          # Update the downloads line in README
          sed -i "s/### 📦 [0-9,]*+ total downloads/### 📦 $DISPLAY total downloads/" README.md
          
      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update download stats [skip ci]"
            git push
          fi
